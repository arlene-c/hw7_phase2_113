<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireboy & Watergirl</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@500;700&display=swap');

:root {
  --fire: #ff6b2b;
  --fire-glow: #ff9a5c;
  --fire-dark: #cc3300;
  --water: #2ba4ff;
  --water-glow: #5cc3ff;
  --water-dark: #0066cc;
  --stone: #3a3632;
  --stone-light: #5a5550;
  --stone-dark: #1a1612;
  --gold: #ffd700;
  --bg: #0d0b09;
  --lava: #ff3300;
  --poison: #44cc44;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Rajdhani', sans-serif;
}

#game-container {
  position: relative;
  width: 960px;
  height: 640px;
  border: 3px solid var(--stone-light);
  border-radius: 4px;
  box-shadow:
    0 0 40px rgba(0,0,0,0.8),
    inset 0 0 60px rgba(0,0,0,0.3);
  overflow: hidden;
}

#gameCanvas {
  display: block;
  width: 960px;
  height: 640px;
  image-rendering: pixelated;
}

#ui-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

#ui-overlay > div { pointer-events: auto; }

.hidden { display: none !important; }

/* ── Title Screen ── */
#title-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, rgba(30,25,20,0.95) 0%, rgba(10,8,6,0.98) 100%);
  z-index: 10;
}

.title-glow {
  position: absolute;
  width: 600px;
  height: 300px;
  top: 50px;
  background: radial-gradient(ellipse, rgba(255,107,43,0.15) 0%, rgba(43,164,255,0.1) 50%, transparent 70%);
  filter: blur(40px);
  animation: glowPulse 3s ease-in-out infinite alternate;
}

@keyframes glowPulse {
  from { opacity: 0.6; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1.05); }
}

.game-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 52px;
  font-weight: 900;
  letter-spacing: 4px;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}

.fire-text {
  color: var(--fire);
  text-shadow: 0 0 20px rgba(255,107,43,0.6), 0 0 40px rgba(255,107,43,0.3);
}
.boy-text {
  color: var(--fire-glow);
  text-shadow: 0 0 15px rgba(255,154,92,0.4);
}
.amp {
  color: var(--gold);
  margin: 0 12px;
  font-size: 36px;
  vertical-align: middle;
}
.water-text {
  color: var(--water);
  text-shadow: 0 0 20px rgba(43,164,255,0.6), 0 0 40px rgba(43,164,255,0.3);
}
.girl-text {
  color: var(--water-glow);
  text-shadow: 0 0 15px rgba(92,195,255,0.4);
}

.subtitle {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  color: var(--stone-light);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 40px;
}

.controls-info {
  display: flex;
  gap: 60px;
  margin-bottom: 40px;
}

.control-group {
  text-align: center;
  padding: 16px 24px;
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
}

.control-group h3 {
  font-size: 18px;
  margin-bottom: 8px;
}

.fire-controls h3 { color: var(--fire); }
.water-controls h3 { color: var(--water); }

.keys {
  color: #998;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

kbd {
  display: inline-block;
  padding: 3px 8px;
  font-size: 13px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  color: #ccc;
  min-width: 28px;
  text-align: center;
}

.pulse-btn {
  padding: 14px 48px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 3px;
  color: #fff;
  background: linear-gradient(135deg, var(--fire-dark), var(--fire));
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(255,107,43,0.3);
  margin-bottom: 12px;
}

.pulse-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(255,107,43,0.5);
}

.secondary-btn {
  padding: 10px 32px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 2px;
  color: #aaa;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}

.secondary-btn:hover {
  color: #fff;
  background: rgba(255,255,255,0.1);
}

/* ── Level Select ── */
#level-select {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, rgba(30,25,20,0.97) 0%, rgba(10,8,6,0.99) 100%);
  z-index: 10;
}

#level-select h2 {
  font-family: 'Cinzel Decorative', serif;
  color: var(--gold);
  font-size: 32px;
  margin-bottom: 30px;
}

#level-grid {
  display: grid;
  grid-template-columns: repeat(5, 80px);
  gap: 16px;
  margin-bottom: 30px;
}

.level-btn {
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel Decorative', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--gold);
  background: rgba(255,215,0,0.05);
  border: 2px solid rgba(255,215,0,0.2);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.level-btn:hover {
  background: rgba(255,215,0,0.12);
  border-color: rgba(255,215,0,0.5);
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(255,215,0,0.15);
}

/* ── HUD ── */
#hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 20px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  z-index: 5;
}

.hud-left, .hud-right {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 20px;
  font-weight: 700;
}

.hud-left { color: var(--fire-glow); }
.hud-right { color: var(--water-glow); }

.hud-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #ccc;
}

#level-name {
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.7;
}

#timer {
  font-size: 22px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* ── Win Screen ── */
#win-screen, #death-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(10,8,6,0.92);
  z-index: 10;
}

.win-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 48px;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,215,0,0.4);
  margin-bottom: 20px;
}

.win-stats {
  text-align: center;
  margin-bottom: 30px;
  color: #bbb;
  font-size: 20px;
  line-height: 2;
}

.win-stats span { color: #fff; font-weight: 700; }

.death-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 48px;
  color: #ff4444;
  text-shadow: 0 0 30px rgba(255,60,60,0.4);
  margin-bottom: 12px;
}

.death-msg {
  color: #999;
  font-size: 18px;
  margin-bottom: 30px;
}

/* ── Responsive ── */
@media (max-width: 980px) {
  #game-container {
    width: 100vw;
    height: calc(100vw * 640 / 960);
    border: none;
    border-radius: 0;
  }
  #gameCanvas {
    width: 100%;
    height: 100%;
  }
  .game-title { font-size: 32px; }
  .controls-info { gap: 20px; }
}
</style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
      <div id="title-screen">
        <div class="title-glow"></div>
        <h1 class="game-title">
          <span class="fire-text">FIRE</span><span class="boy-text">BOY</span>
          <span class="amp">&</span>
          <span class="water-text">WATER</span><span class="girl-text">GIRL</span>
        </h1>
        <p class="subtitle">Temple of Elements</p>
        <div class="controls-info">
          <div class="control-group fire-controls"><h3>🔥 Fireboy</h3><div class="keys"><kbd>W</kbd> Jump <kbd>A</kbd><kbd>D</kbd> Move</div></div>
          <div class="control-group water-controls"><h3>💧 Watergirl</h3><div class="keys"><kbd>↑</kbd> Jump <kbd>←</kbd><kbd>→</kbd> Move</div></div>
        </div>
        <button id="startBtn" class="pulse-btn">START GAME</button>
        <button id="levelSelectBtn" class="secondary-btn">LEVEL SELECT</button>
      </div>
      <div id="level-select" class="hidden"><h2>Select Level</h2><div id="level-grid"></div><button id="backBtn" class="secondary-btn">BACK</button></div>
      <div id="hud" class="hidden">
        <div class="hud-left"><span class="hud-label fire-label">🔥</span><span id="fire-gems">0</span></div>
        <div class="hud-center"><span id="level-name">Level 1</span><span id="timer">0:00</span></div>
        <div class="hud-right"><span class="hud-label water-label">💧</span><span id="water-gems">0</span></div>
      </div>
      <div id="win-screen" class="hidden"><h2 class="win-title">LEVEL COMPLETE!</h2><div class="win-stats"><p>Time: <span id="win-time"></span></p><p>Fire Gems: <span id="win-fire"></span></p><p>Water Gems: <span id="win-water"></span></p></div><button id="nextLevelBtn" class="pulse-btn">NEXT LEVEL</button><button id="menuBtn" class="secondary-btn">MENU</button></div>
      <div id="death-screen" class="hidden"><h2 class="death-title">OH NO!</h2><p class="death-msg" id="death-msg">A player touched the wrong element!</p><button id="retryBtn" class="pulse-btn">RETRY</button></div>
    </div>
</div>
<script>
// ── engine.js ── Physics, Input, Entity System ──

const TILE = 32;
const COLS = 30;
const ROWS = 20;
const GRAVITY = 0.55;
const FRICTION = 0.82;
const MAX_FALL = 12;

// ── Input Manager ──
class InputManager {
  constructor() {
    this.keys = {};
    window.addEventListener('keydown', e => {
      this.keys[e.code] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', e => {
      this.keys[e.code] = false;
    });
  }
  isDown(code) { return !!this.keys[code]; }
}

// ── Entity base ──
class Entity {
  constructor(x, y, w, h) {
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.vx = 0;
    this.vy = 0;
    this.onGround = false;
    this.alive = true;
    this.facingRight = true;
  }

  get left() { return this.x; }
  get right() { return this.x + this.w; }
  get top() { return this.y; }
  get bottom() { return this.y + this.h; }
  get centerX() { return this.x + this.w / 2; }
  get centerY() { return this.y + this.h / 2; }

  overlaps(other) {
    return this.left < other.right &&
           this.right > other.left &&
           this.top < other.bottom &&
           this.bottom > other.top;
  }
}

// ── Player ──
class Player extends Entity {
  constructor(x, y, type) {
    super(x, y, 20, 30);
    this.type = type; // 'fire' or 'water'
    this.speed = 3.2;
    this.jumpForce = -9.5;
    this.gems = 0;
    this.atDoor = false;
    this.walkFrame = 0;
    this.walkTimer = 0;
    this.eyeBlink = 0;
    this.particles = [];
  }

  update(input, level) {
    // Movement
    let moveLeft, moveRight, jump;

    if (this.type === 'fire') {
      moveLeft = input.isDown('KeyA');
      moveRight = input.isDown('KeyD');
      jump = input.isDown('KeyW');
    } else {
      moveLeft = input.isDown('ArrowLeft');
      moveRight = input.isDown('ArrowRight');
      jump = input.isDown('ArrowUp');
    }

    if (moveLeft) {
      this.vx -= this.speed * 0.4;
      this.facingRight = false;
    }
    if (moveRight) {
      this.vx += this.speed * 0.4;
      this.facingRight = true;
    }

    if (jump && this.onGround) {
      this.vy = this.jumpForce;
      this.onGround = false;
    }

    // Physics
    this.vx *= FRICTION;
    this.vy += GRAVITY;
    if (this.vy > MAX_FALL) this.vy = MAX_FALL;

    // Walk animation
    if (Math.abs(this.vx) > 0.5) {
      this.walkTimer += Math.abs(this.vx);
      if (this.walkTimer > 8) {
        this.walkTimer = 0;
        this.walkFrame = (this.walkFrame + 1) % 4;
      }
    } else {
      this.walkFrame = 0;
      this.walkTimer = 0;
    }

    // Blink
    this.eyeBlink = (this.eyeBlink + 1) % 200;

    // Collision X
    this.x += this.vx;
    this.resolveCollisionX(level);

    // Collision Y
    this.y += this.vy;
    this.onGround = false;
    this.resolveCollisionY(level);

    // Particles
    this.updateParticles();
    if (Math.abs(this.vx) > 1 || !this.onGround) {
      this.spawnParticle();
    }
  }

  resolveCollisionX(level) {
    const tiles = level.tiles;
    const startCol = Math.floor(this.left / TILE);
    const endCol = Math.floor(this.right / TILE);
    const startRow = Math.floor(this.top / TILE);
    const endRow = Math.floor(this.bottom / TILE);

    for (let r = startRow; r <= endRow; r++) {
      for (let c = startCol; c <= endCol; c++) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
        const tile = tiles[r]?.[c];
        if (tile === 1 || tile === 10) { // solid wall or stone
          const tileRect = { x: c * TILE, y: r * TILE, w: TILE, h: TILE };
          if (this.left < tileRect.x + tileRect.w &&
              this.right > tileRect.x &&
              this.top < tileRect.y + tileRect.h &&
              this.bottom > tileRect.y) {
            if (this.vx > 0) {
              this.x = tileRect.x - this.w;
            } else if (this.vx < 0) {
              this.x = tileRect.x + tileRect.w;
            }
            this.vx = 0;
          }
        }
      }
    }
  }

  resolveCollisionY(level) {
    const tiles = level.tiles;
    const startCol = Math.floor(this.left / TILE);
    const endCol = Math.floor(this.right / TILE);
    const startRow = Math.floor(this.top / TILE);
    const endRow = Math.floor(this.bottom / TILE);

    for (let r = startRow; r <= endRow; r++) {
      for (let c = startCol; c <= endCol; c++) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
        const tile = tiles[r]?.[c];
        if (tile === 1 || tile === 10) {
          const tileRect = { x: c * TILE, y: r * TILE, w: TILE, h: TILE };
          if (this.left < tileRect.x + tileRect.w &&
              this.right > tileRect.x &&
              this.top < tileRect.y + tileRect.h &&
              this.bottom > tileRect.y) {
            if (this.vy > 0) {
              this.y = tileRect.y - this.h;
              this.vy = 0;
              this.onGround = true;
            } else if (this.vy < 0) {
              this.y = tileRect.y + tileRect.h;
              this.vy = 0;
            }
          }
        }
      }
    }
  }

  spawnParticle() {
    if (Math.random() > 0.3) return;
    this.particles.push({
      x: this.centerX + (Math.random() - 0.5) * 8,
      y: this.bottom - 2,
      vx: (Math.random() - 0.5) * 1.5,
      vy: -Math.random() * 2 - 0.5,
      life: 1,
      size: Math.random() * 3 + 1,
    });
  }

  updateParticles() {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.03;
      if (p.life <= 0) this.particles.splice(i, 1);
    }
    if (this.particles.length > 30) this.particles.splice(0, this.particles.length - 30);
  }

  checkHazards(level) {
    const tiles = level.tiles;
    // Check surrounding tiles for hazards
    const checkPoints = [
      { x: this.left + 2, y: this.bottom + 1 },
      { x: this.right - 2, y: this.bottom + 1 },
      { x: this.centerX, y: this.bottom + 1 },
    ];

    for (const pt of checkPoints) {
      const c = Math.floor(pt.x / TILE);
      const r = Math.floor(pt.y / TILE);
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
      const tile = tiles[r][c];

      // Lava (2) kills water, safe for fire
      if (tile === 2 && this.type === 'water') return 'lava';
      // Water (3) kills fire, safe for water
      if (tile === 3 && this.type === 'fire') return 'water';
      // Poison/green (4) kills both
      if (tile === 4) return 'poison';
    }
    return null;
  }
}

// ── Gem ──
class Gem extends Entity {
  constructor(x, y, type) {
    super(x, y, 16, 16);
    this.type = type; // 'fire' or 'water'
    this.collected = false;
    this.floatPhase = Math.random() * Math.PI * 2;
    this.sparkles = [];
  }

  update() {
    this.floatPhase += 0.05;
    if (Math.random() < 0.05) {
      this.sparkles.push({
        x: this.centerX + (Math.random() - 0.5) * 12,
        y: this.centerY + (Math.random() - 0.5) * 12,
        life: 1,
        size: Math.random() * 2 + 1,
      });
    }
    for (let i = this.sparkles.length - 1; i >= 0; i--) {
      this.sparkles[i].life -= 0.04;
      this.sparkles[i].y -= 0.3;
      if (this.sparkles[i].life <= 0) this.sparkles.splice(i, 1);
    }
  }
}

// ── Door ──
class Door extends Entity {
  constructor(x, y, type) {
    super(x, y, 28, 40);
    this.type = type;
    this.glowPhase = Math.random() * Math.PI * 2;
    this.open = false;
  }

  update() {
    this.glowPhase += 0.04;
  }
}

// ── Lever & Gate (Buttons + Platforms) ──
class Button extends Entity {
  constructor(x, y, gateId) {
    super(x, y, 28, 8);
    this.gateId = gateId;
    this.pressed = false;
    this.pressAnim = 0;
  }

  checkPress(players) {
    this.pressed = false;
    for (const p of players) {
      if (p.alive && this.overlaps({
        x: p.x, y: p.y, w: p.w, h: p.h,
        get left() { return this.x; },
        get right() { return this.x + this.w; },
        get top() { return this.y; },
        get bottom() { return this.y + this.h; }
      })) {
        this.pressed = true;
      }
    }
    this.pressAnim += (this.pressed ? 1 - this.pressAnim : -this.pressAnim) * 0.2;
  }
}

class Gate extends Entity {
  constructor(x, y, h, gateId) {
    super(x, y, TILE, h);
    this.gateId = gateId;
    this.openAmount = 0;
    this.originalY = y;
    this.originalH = h;
  }

  update(buttons) {
    const isActive = buttons.some(b => b.gateId === this.gateId && b.pressed);
    const target = isActive ? 1 : 0;
    this.openAmount += (target - this.openAmount) * 0.08;
    // Gate slides up
    this.y = this.originalY - this.originalH * this.openAmount;
  }
}

// ── Moving Platform ──
class MovingPlatform extends Entity {
  constructor(x, y, w, dx, dy, speed) {
    super(x, y, w, 12);
    this.startX = x;
    this.startY = y;
    this.dx = dx; // total movement distance x
    this.dy = dy; // total movement distance y
    this.speed = speed || 0.01;
    this.t = 0;
    this.prevX = x;
    this.prevY = y;
  }

  update() {
    this.prevX = this.x;
    this.prevY = this.y;
    this.t += this.speed;
    const ease = (Math.sin(this.t * Math.PI * 2 - Math.PI / 2) + 1) / 2;
    this.x = this.startX + this.dx * ease;
    this.y = this.startY + this.dy * ease;
  }

  get deltaX() { return this.x - this.prevX; }
  get deltaY() { return this.y - this.prevY; }

  carryPlayer(player) {
    // Check if player is standing on this platform
    const onPlatform =
      player.bottom >= this.y - 2 &&
      player.bottom <= this.y + 6 &&
      player.right > this.x &&
      player.left < this.right;

    if (onPlatform && player.vy >= 0) {
      player.y = this.y - player.h;
      player.vy = 0;
      player.onGround = true;
      player.x += this.deltaX;
      player.y += this.deltaY;
    }
  }
}

// ── renderer.js ── Canvas drawing with temple aesthetic ──

class Renderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    canvas.width = COLS * TILE;
    canvas.height = ROWS * TILE;
    this.time = 0;

    // Cache gradient textures
    this.lavaGrad = this.ctx.createLinearGradient(0, 0, 0, TILE);
    this.lavaGrad.addColorStop(0, '#ff6600');
    this.lavaGrad.addColorStop(0.5, '#ff3300');
    this.lavaGrad.addColorStop(1, '#cc2200');

    this.waterGrad = this.ctx.createLinearGradient(0, 0, 0, TILE);
    this.waterGrad.addColorStop(0, '#2288ff');
    this.waterGrad.addColorStop(0.5, '#1166dd');
    this.waterGrad.addColorStop(1, '#0044aa');

    this.poisonGrad = this.ctx.createLinearGradient(0, 0, 0, TILE);
    this.poisonGrad.addColorStop(0, '#44cc44');
    this.poisonGrad.addColorStop(0.5, '#22aa22');
    this.poisonGrad.addColorStop(1, '#118811');
  }

  clear() {
    this.ctx.fillStyle = '#1a1612';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
  }

  drawTiles(tiles) {
    this.time += 0.02;
    const ctx = this.ctx;

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const tile = tiles[r][c];
        const x = c * TILE;
        const y = r * TILE;

        if (tile === 1 || tile === 10) {
          // Stone wall
          this.drawStone(x, y, r, c);
        } else if (tile === 2) {
          // Lava
          this.drawLiquid(x, y, '#ff3300', '#ff6600', '#ff9900', r, c);
        } else if (tile === 3) {
          // Water
          this.drawLiquid(x, y, '#1166dd', '#2288ff', '#44aaff', r, c);
        } else if (tile === 4) {
          // Poison
          this.drawLiquid(x, y, '#22aa22', '#44cc44', '#66ee66', r, c);
        }
      }
    }
  }

  drawStone(x, y, r, c) {
    const ctx = this.ctx;
    // Base stone
    const shade = ((r * 7 + c * 13) % 20) - 10;
    const base = 50 + shade;
    ctx.fillStyle = `rgb(${base + 8}, ${base + 4}, ${base})`;
    ctx.fillRect(x, y, TILE, TILE);

    // Brick pattern
    ctx.strokeStyle = `rgba(0,0,0,0.3)`;
    ctx.lineWidth = 1;
    if (r % 2 === 0) {
      ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
    } else {
      ctx.strokeRect(x - TILE / 2 + 0.5, y + 0.5, TILE - 1, TILE - 1);
      ctx.strokeRect(x + TILE / 2 + 0.5, y + 0.5, TILE - 1, TILE - 1);
    }

    // Edge highlight
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(x, y, TILE, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(x, y + TILE - 1, TILE, 1);
  }

  drawLiquid(x, y, dark, mid, light, r, c) {
    const ctx = this.ctx;
    ctx.fillStyle = dark;
    ctx.fillRect(x, y, TILE, TILE);

    // Animated surface wave
    const wave = Math.sin(this.time * 3 + c * 0.8) * 3;
    ctx.fillStyle = mid;
    ctx.fillRect(x, y, TILE, TILE / 2 + wave);

    // Glow on top
    ctx.fillStyle = light;
    const waveTop = Math.sin(this.time * 2 + c * 0.5) * 2;
    ctx.fillRect(x, y + waveTop, TILE, 3);

    // Bubbles
    if (Math.random() < 0.01) {
      ctx.beginPath();
      ctx.arc(x + Math.random() * TILE, y + Math.random() * TILE * 0.6, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fill();
    }

    // Surface shimmer
    const shimmer = Math.sin(this.time * 4 + c * 1.2) * 0.15 + 0.1;
    ctx.fillStyle = `rgba(255,255,255,${shimmer})`;
    ctx.fillRect(x, y, TILE, 2);
  }

  drawPlayer(player) {
    const ctx = this.ctx;
    const { x, y, w, h, type, facingRight, walkFrame, eyeBlink, onGround, vy } = player;

    ctx.save();

    // Glow underneath
    const glowColor = type === 'fire' ? 'rgba(255,107,43,0.15)' : 'rgba(43,164,255,0.15)';
    const glowRad = ctx.createRadialGradient(x + w / 2, y + h, 0, x + w / 2, y + h, 25);
    glowRad.addColorStop(0, glowColor);
    glowRad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowRad;
    ctx.fillRect(x - 15, y + h - 15, w + 30, 30);

    const cx = x + w / 2;
    const flip = facingRight ? 1 : -1;

    ctx.translate(cx, y + h);
    ctx.scale(flip, 1);
    ctx.translate(-cx, -(y + h));

    // Squash & stretch
    let scaleX = 1, scaleY = 1;
    if (!onGround && vy < -2) {
      scaleX = 0.85;
      scaleY = 1.15;
    } else if (!onGround && vy > 2) {
      scaleX = 1.1;
      scaleY = 0.9;
    }
    // Walk bob
    const bob = onGround ? Math.sin(walkFrame * Math.PI / 2) * 2 : 0;

    ctx.translate(cx, y + h);
    ctx.scale(scaleX, scaleY);
    ctx.translate(-cx, -(y + h));

    if (type === 'fire') {
      this.drawFireboy(ctx, x, y - bob, w, h);
    } else {
      this.drawWatergirl(ctx, x, y - bob, w, h);
    }

    ctx.restore();

    // Draw particles
    this.drawPlayerParticles(player);
  }

  drawFireboy(ctx, x, y, w, h) {
    // Body
    const bodyGrad = ctx.createLinearGradient(x, y, x, y + h);
    bodyGrad.addColorStop(0, '#ff8844');
    bodyGrad.addColorStop(0.4, '#ff6622');
    bodyGrad.addColorStop(1, '#cc4400');
    ctx.fillStyle = bodyGrad;

    // Rounded body
    const bx = x + 1, by = y + 8, bw = w - 2, bh = h - 8;
    ctx.beginPath();
    ctx.moveTo(bx + 3, by);
    ctx.lineTo(bx + bw - 3, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + 3);
    ctx.lineTo(bx + bw, by + bh - 2);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - 3, by + bh);
    ctx.lineTo(bx + 3, by + bh);
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - 2);
    ctx.lineTo(bx, by + 3);
    ctx.quadraticCurveTo(bx, by, bx + 3, by);
    ctx.fill();

    // Head (flame-like)
    ctx.fillStyle = '#ff7733';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + 7, 8, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Flame hair
    const flicker = Math.sin(this.time * 8) * 2;
    ctx.fillStyle = '#ffaa33';
    ctx.beginPath();
    ctx.moveTo(x + 3, y + 5);
    ctx.quadraticCurveTo(x + w / 2, y - 6 + flicker, x + w - 3, y + 5);
    ctx.fill();

    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.moveTo(x + 5, y + 4);
    ctx.quadraticCurveTo(x + w / 2, y - 3 + flicker * 0.7, x + w - 5, y + 4);
    ctx.fill();

    // Eyes
    const blinkH = this.isBlinking(this.time) ? 0.5 : 2.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x + 6, y + 7, 2.5, blinkH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 7, 2.5, blinkH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    if (!this.isBlinking(this.time)) {
      ctx.fillStyle = '#331100';
      ctx.beginPath();
      ctx.arc(x + 7, y + 7, 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 15, y + 7, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Legs
    ctx.fillStyle = '#cc4400';
    ctx.fillRect(x + 3, y + h - 4, 5, 4);
    ctx.fillRect(x + w - 8, y + h - 4, 5, 4);
  }

  drawWatergirl(ctx, x, y, w, h) {
    // Body
    const bodyGrad = ctx.createLinearGradient(x, y, x, y + h);
    bodyGrad.addColorStop(0, '#55bbff');
    bodyGrad.addColorStop(0.4, '#2299ee');
    bodyGrad.addColorStop(1, '#0066bb');
    ctx.fillStyle = bodyGrad;

    const bx = x + 1, by = y + 8, bw = w - 2, bh = h - 8;
    ctx.beginPath();
    ctx.moveTo(bx + 3, by);
    ctx.lineTo(bx + bw - 3, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + 3);
    ctx.lineTo(bx + bw, by + bh - 2);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - 3, by + bh);
    ctx.lineTo(bx + 3, by + bh);
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - 2);
    ctx.lineTo(bx, by + 3);
    ctx.quadraticCurveTo(bx, by, bx + 3, by);
    ctx.fill();

    // Head
    ctx.fillStyle = '#44aaee';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + 7, 8, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Water droplet hair
    const wobble = Math.sin(this.time * 4) * 1.5;
    ctx.fillStyle = '#66ccff';
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y - 5 + wobble);
    ctx.quadraticCurveTo(x + w / 2 - 6, y + 2, x + 3, y + 5);
    ctx.quadraticCurveTo(x + w / 2, y + 1, x + w - 3, y + 5);
    ctx.quadraticCurveTo(x + w / 2 + 6, y + 2, x + w / 2, y - 5 + wobble);
    ctx.fill();

    ctx.fillStyle = '#88ddff';
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y - 2 + wobble * 0.6);
    ctx.quadraticCurveTo(x + w / 2 - 3, y + 3, x + 5, y + 4);
    ctx.quadraticCurveTo(x + w / 2, y + 2, x + w - 5, y + 4);
    ctx.quadraticCurveTo(x + w / 2 + 3, y + 3, x + w / 2, y - 2 + wobble * 0.6);
    ctx.fill();

    // Eyes
    const blinkH = this.isBlinking(this.time + 1) ? 0.5 : 2.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x + 6, y + 7, 2.5, blinkH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 7, 2.5, blinkH, 0, 0, Math.PI * 2);
    ctx.fill();

    if (!this.isBlinking(this.time + 1)) {
      ctx.fillStyle = '#003366';
      ctx.beginPath();
      ctx.arc(x + 7, y + 7, 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 15, y + 7, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Legs
    ctx.fillStyle = '#0066bb';
    ctx.fillRect(x + 3, y + h - 4, 5, 4);
    ctx.fillRect(x + w - 8, y + h - 4, 5, 4);
  }

  isBlinking(t) {
    return (t * 60) % 200 < 8;
  }

  drawPlayerParticles(player) {
    const ctx = this.ctx;
    for (const p of player.particles) {
      const alpha = p.life * 0.6;
      if (player.type === 'fire') {
        ctx.fillStyle = `rgba(255,${Math.floor(150 * p.life)},${Math.floor(50 * p.life)},${alpha})`;
      } else {
        ctx.fillStyle = `rgba(${Math.floor(100 * p.life)},${Math.floor(180 * p.life)},255,${alpha})`;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawGem(gem) {
    if (gem.collected) return;
    const ctx = this.ctx;
    const float = Math.sin(gem.floatPhase) * 3;
    const cx = gem.x + gem.w / 2;
    const cy = gem.y + gem.h / 2 + float;

    // Glow
    const glowColor = gem.type === 'fire'
      ? 'rgba(255,107,43,0.25)'
      : 'rgba(43,164,255,0.25)';
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18);
    glow.addColorStop(0, glowColor);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(cx - 20, cy - 20, 40, 40);

    // Diamond shape
    const colors = gem.type === 'fire'
      ? ['#ff6b2b', '#ff9a5c', '#ffcc88']
      : ['#2ba4ff', '#5cc3ff', '#88ddff'];

    ctx.fillStyle = colors[0];
    ctx.beginPath();
    ctx.moveTo(cx, cy - 8);
    ctx.lineTo(cx + 7, cy);
    ctx.lineTo(cx, cy + 8);
    ctx.lineTo(cx - 7, cy);
    ctx.closePath();
    ctx.fill();

    // Highlight
    ctx.fillStyle = colors[2];
    ctx.beginPath();
    ctx.moveTo(cx, cy - 6);
    ctx.lineTo(cx + 3, cy - 1);
    ctx.lineTo(cx, cy + 1);
    ctx.lineTo(cx - 3, cy - 1);
    ctx.closePath();
    ctx.fill();

    // Sparkles
    for (const s of gem.sparkles) {
      ctx.fillStyle = `rgba(255,255,255,${s.life * 0.8})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y + float, s.size * s.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawDoor(door) {
    const ctx = this.ctx;
    const { x, y, w, h, type, glowPhase } = door;

    // Door glow
    const pulse = Math.sin(glowPhase) * 0.15 + 0.3;
    const color = type === 'fire'
      ? `rgba(255,107,43,${pulse})`
      : `rgba(43,164,255,${pulse})`;

    const glow = ctx.createRadialGradient(x + w / 2, y + h / 2, 0, x + w / 2, y + h / 2, 35);
    glow.addColorStop(0, color);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(x - 20, y - 20, w + 40, h + 40);

    // Door frame
    ctx.fillStyle = type === 'fire' ? '#553320' : '#203355';
    ctx.fillRect(x - 2, y - 2, w + 4, h + 4);

    // Door interior
    const doorGrad = ctx.createLinearGradient(x, y, x, y + h);
    if (type === 'fire') {
      doorGrad.addColorStop(0, '#ff8844');
      doorGrad.addColorStop(1, '#cc4400');
    } else {
      doorGrad.addColorStop(0, '#4488ff');
      doorGrad.addColorStop(1, '#0044cc');
    }
    ctx.fillStyle = doorGrad;
    ctx.fillRect(x, y, w, h);

    // Arch top
    ctx.fillStyle = type === 'fire' ? '#553320' : '#203355';
    ctx.beginPath();
    ctx.moveTo(x - 2, y + 8);
    ctx.quadraticCurveTo(x + w / 2, y - 8, x + w + 2, y + 8);
    ctx.lineTo(x + w + 2, y);
    ctx.lineTo(x - 2, y);
    ctx.closePath();
    ctx.fill();

    // Inner arch
    if (type === 'fire') {
      ctx.fillStyle = '#ffaa66';
    } else {
      ctx.fillStyle = '#66aaff';
    }
    ctx.beginPath();
    ctx.moveTo(x + 2, y + 10);
    ctx.quadraticCurveTo(x + w / 2, y - 2, x + w - 2, y + 10);
    ctx.lineTo(x + w - 2, y + h);
    ctx.lineTo(x + 2, y + h);
    ctx.closePath();
    ctx.fill();

    // Symbol
    ctx.font = '16px serif';
    ctx.textAlign = 'center';
    ctx.fillText(type === 'fire' ? '🔥' : '💧', x + w / 2, y + h / 2 + 5);
  }

  drawButton(button) {
    const ctx = this.ctx;
    const { x, y, w, h, pressed, pressAnim } = button;
    const pressedY = y + pressAnim * 4;

    // Base plate
    ctx.fillStyle = '#555';
    ctx.fillRect(x - 2, y + h - 2, w + 4, 6);

    // Button top
    ctx.fillStyle = pressed ? '#cc8800' : '#aa7700';
    ctx.fillRect(x, pressedY, w, h - pressAnim * 4);

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x, pressedY, w, 2);
  }

  drawGate(gate) {
    const ctx = this.ctx;
    if (gate.openAmount > 0.95) return; // fully open

    const drawH = gate.originalH * (1 - gate.openAmount);
    const drawY = gate.originalY;

    ctx.fillStyle = '#665544';
    ctx.fillRect(gate.x, drawY, gate.w, drawH);

    // Bars
    ctx.strokeStyle = '#887766';
    ctx.lineWidth = 2;
    for (let i = 4; i < gate.w; i += 8) {
      ctx.beginPath();
      ctx.moveTo(gate.x + i, drawY);
      ctx.lineTo(gate.x + i, drawY + drawH);
      ctx.stroke();
    }

    // Cross bars
    ctx.strokeStyle = '#776655';
    for (let j = 8; j < drawH; j += 16) {
      ctx.beginPath();
      ctx.moveTo(gate.x, drawY + j);
      ctx.lineTo(gate.x + gate.w, drawY + j);
      ctx.stroke();
    }
  }

  drawPlatform(platform) {
    const ctx = this.ctx;
    const { x, y, w, h } = platform;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x + 2, y + 3, w, h);

    // Platform body
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, '#888070');
    grad.addColorStop(0.5, '#6a6258');
    grad.addColorStop(1, '#555048');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);

    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x, y, w, 2);

    // Edge marks
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x, y + h - 2, w, 2);

    // Rivets
    ctx.fillStyle = '#999';
    ctx.beginPath();
    ctx.arc(x + 5, y + h / 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + w - 5, y + h / 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  drawBackground() {
    const ctx = this.ctx;
    // Ambient torch glow
    const torchPositions = [
      { x: 2 * TILE, y: 4 * TILE },
      { x: 27 * TILE, y: 4 * TILE },
      { x: 14 * TILE, y: 2 * TILE },
    ];

    for (const torch of torchPositions) {
      const flicker = Math.sin(this.time * 6 + torch.x) * 5 + 30;
      const glow = ctx.createRadialGradient(torch.x, torch.y, 0, torch.x, torch.y, flicker + 40);
      glow.addColorStop(0, 'rgba(255,150,50,0.06)');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(torch.x - 80, torch.y - 80, 160, 160);
    }
  }
}

// ── game.js ── Main game loop and state management ──

(function () {
  const canvas = document.getElementById('gameCanvas');
  const renderer = new Renderer(canvas);
  const input = new InputManager();

  // UI elements
  const titleScreen = document.getElementById('title-screen');
  const levelSelect = document.getElementById('level-select');
  const hud = document.getElementById('hud');
  const winScreen = document.getElementById('win-screen');
  const deathScreen = document.getElementById('death-screen');
  const fireGemsEl = document.getElementById('fire-gems');
  const waterGemsEl = document.getElementById('water-gems');
  const levelNameEl = document.getElementById('level-name');
  const timerEl = document.getElementById('timer');

  let state = 'title'; // title, playing, win, dead
  let currentLevel = 0;
  let fireboy, watergirl;
  let gems, doors, buttons, gates, platforms;
  let startTime, elapsedTime;

  // ── Build level select ──
  const levelGrid = document.getElementById('level-grid');
  LEVELS.forEach((lvl, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    btn.textContent = i + 1;
    btn.title = lvl.name;
    btn.addEventListener('click', () => {
      currentLevel = i;
      startLevel(i);
    });
    levelGrid.appendChild(btn);
  });

  // ── Button handlers ──
  document.getElementById('startBtn').addEventListener('click', () => {
    currentLevel = 0;
    startLevel(0);
  });

  document.getElementById('levelSelectBtn').addEventListener('click', () => {
    titleScreen.classList.add('hidden');
    levelSelect.classList.remove('hidden');
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    levelSelect.classList.add('hidden');
    titleScreen.classList.remove('hidden');
  });

  document.getElementById('nextLevelBtn').addEventListener('click', () => {
    currentLevel++;
    if (currentLevel >= LEVELS.length) {
      currentLevel = 0;
      showTitle();
    } else {
      startLevel(currentLevel);
    }
  });

  document.getElementById('menuBtn').addEventListener('click', showTitle);
  document.getElementById('retryBtn').addEventListener('click', () => startLevel(currentLevel));

  function showTitle() {
    state = 'title';
    titleScreen.classList.remove('hidden');
    levelSelect.classList.add('hidden');
    hud.classList.add('hidden');
    winScreen.classList.add('hidden');
    deathScreen.classList.add('hidden');
  }

  function startLevel(idx) {
    const lvl = LEVELS[idx];

    // Hide all UI, show HUD
    titleScreen.classList.add('hidden');
    levelSelect.classList.add('hidden');
    winScreen.classList.add('hidden');
    deathScreen.classList.add('hidden');
    hud.classList.remove('hidden');

    levelNameEl.textContent = lvl.name;

    // Create players
    fireboy = new Player(lvl.fireStart.x, lvl.fireStart.y, 'fire');
    watergirl = new Player(lvl.waterStart.x, lvl.waterStart.y, 'water');

    // Create gems
    gems = lvl.gems.map(g => new Gem(g.x, g.y, g.type));

    // Create doors
    doors = [
      new Door(lvl.fireDoor.x, lvl.fireDoor.y, 'fire'),
      new Door(lvl.waterDoor.x, lvl.waterDoor.y, 'water'),
    ];

    // Create buttons & gates
    buttons = (lvl.buttons || []).map(b => new Button(b.x, b.y, b.gateId));
    gates = (lvl.gates || []).map(g => new Gate(g.x, g.y, g.h, g.gateId));

    // Create platforms
    platforms = (lvl.platforms || []).map(p =>
      new MovingPlatform(p.x, p.y, p.w, p.dx, p.dy, p.speed)
    );

    startTime = Date.now();
    state = 'playing';
  }

  // ── Game Loop ──
  function update() {
    if (state !== 'playing') return;

    const lvl = LEVELS[currentLevel];

    // Update players
    fireboy.update(input, lvl);
    watergirl.update(input, lvl);

    // Platforms
    for (const plat of platforms) {
      plat.update();
      plat.carryPlayer(fireboy);
      plat.carryPlayer(watergirl);
    }

    // Buttons & gates
    for (const btn of buttons) {
      btn.checkPress([fireboy, watergirl]);
    }
    for (const gate of gates) {
      gate.update(buttons);
    }

    // Gem collection
    for (const gem of gems) {
      gem.update();
      if (gem.collected) continue;

      if (gem.type === 'fire' && overlapsEntity(fireboy, gem)) {
        gem.collected = true;
        fireboy.gems++;
      }
      if (gem.type === 'water' && overlapsEntity(watergirl, gem)) {
        gem.collected = true;
        watergirl.gems++;
      }
    }

    // Door check
    const fireDoor = doors.find(d => d.type === 'fire');
    const waterDoor = doors.find(d => d.type === 'water');
    fireDoor.update();
    waterDoor.update();

    fireboy.atDoor = overlapsEntity(fireboy, fireDoor);
    watergirl.atDoor = overlapsEntity(watergirl, waterDoor);

    // Win condition
    if (fireboy.atDoor && watergirl.atDoor) {
      winLevel();
      return;
    }

    // Hazard check
    const fireHazard = fireboy.checkHazards(lvl);
    const waterHazard = watergirl.checkHazards(lvl);

    if (fireHazard) {
      die(fireHazard === 'water'
        ? 'Fireboy fell in water!'
        : 'Fireboy touched poison!');
      return;
    }
    if (waterHazard) {
      die(waterHazard === 'lava'
        ? 'Watergirl fell in lava!'
        : 'Watergirl touched poison!');
      return;
    }

    // Out of bounds
    if (fireboy.y > ROWS * TILE + 50 || watergirl.y > ROWS * TILE + 50) {
      die('A player fell out of the level!');
      return;
    }

    // Timer
    elapsedTime = Date.now() - startTime;
    const secs = Math.floor(elapsedTime / 1000);
    const mins = Math.floor(secs / 60);
    timerEl.textContent = `${mins}:${String(secs % 60).padStart(2, '0')}`;
    fireGemsEl.textContent = fireboy.gems;
    waterGemsEl.textContent = watergirl.gems;
  }

  function render() {
    renderer.clear();

    if (state === 'title' || state === 'levelselect') {
      // Draw a moody background on title
      drawTitleBackground();
      requestAnimationFrame(gameLoop);
      return;
    }

    const lvl = LEVELS[currentLevel];

    renderer.drawBackground();
    renderer.drawTiles(lvl.tiles);

    // Doors (behind players)
    for (const door of doors) renderer.drawDoor(door);

    // Gates
    for (const gate of gates) renderer.drawGate(gate);

    // Platforms
    for (const plat of platforms) renderer.drawPlatform(plat);

    // Buttons
    for (const btn of buttons) renderer.drawButton(btn);

    // Gems
    for (const gem of gems) renderer.drawGem(gem);

    // Players
    renderer.drawPlayer(fireboy);
    renderer.drawPlayer(watergirl);
  }

  function drawTitleBackground() {
    const ctx = renderer.ctx;
    renderer.clear();

    // Animated embers
    renderer.time += 0.01;
    for (let i = 0; i < 30; i++) {
      const t = renderer.time + i * 0.7;
      const x = (Math.sin(t * 0.3 + i) * 0.5 + 0.5) * canvas.width;
      const y = canvas.height - ((t * 30 + i * 50) % canvas.height);
      const size = Math.sin(t + i) * 1.5 + 2;
      const alpha = Math.max(0, 1 - y / canvas.height) * 0.4;

      ctx.fillStyle = i % 2 === 0
        ? `rgba(255,107,43,${alpha})`
        : `rgba(43,164,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function winLevel() {
    state = 'win';
    hud.classList.add('hidden');
    winScreen.classList.remove('hidden');

    const secs = Math.floor(elapsedTime / 1000);
    const mins = Math.floor(secs / 60);
    document.getElementById('win-time').textContent =
      `${mins}:${String(secs % 60).padStart(2, '0')}`;
    document.getElementById('win-fire').textContent = fireboy.gems;
    document.getElementById('win-water').textContent = watergirl.gems;
  }

  function die(msg) {
    state = 'dead';
    hud.classList.add('hidden');
    deathScreen.classList.remove('hidden');
    document.getElementById('death-msg').textContent = msg;
  }

  function overlapsEntity(a, b) {
    return a.left < b.right &&
           a.right > b.left &&
           a.top < b.bottom &&
           a.bottom > b.top;
  }

  function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
  }

  // Start!
  gameLoop();
})();
</script></body></html>
